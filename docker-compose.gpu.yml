# Use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
services:
  pii-filter:
    image: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
